version: '3.9'

# ─────────────────────────────────────────────────────────────
# Full stack docker-compose — runs ALL 8 services together
# Run from the api-gateway folder: docker-compose up --build
# ─────────────────────────────────────────────────────────────

services:

  # ── API Gateway ───────────────────────────────────────────
  api-gateway:
    build: .
    command: npm run dev
    ports:
      - '3000:3000'          # Only this port is exposed to the outside world
    environment:
      PORT:                      3000
      NODE_ENV:                  development
      JWT_SECRET:                dev_jwt_secret_change_in_prod
      INTERNAL_SECRET:           dev_internal_secret
      AUTH_SERVICE_URL:          http://auth-service:3001
      USER_SERVICE_URL:          http://user-service:3002
      WORKER_SERVICE_URL:        http://worker-service:3003
      BOOKING_SERVICE_URL:       http://booking-service:3004
      REVIEW_SERVICE_URL:        http://review-service:3005
      MEDIA_SERVICE_URL:         http://media-service:3006
      NOTIFICATION_SERVICE_URL:  http://notification-service:3007
      ALLOWED_ORIGINS:           http://localhost:3000
      RATE_LIMIT_WINDOW_MS:      900000
      RATE_LIMIT_MAX:            200
      AUTH_RATE_LIMIT_MAX:       20
    volumes:
      - ./src:/app/src
    depends_on:
      - auth-service
      - user-service
      - worker-service
      - booking-service
      - review-service
      - media-service
      - notification-service
    networks:
      - worker-app-network
    restart: unless-stopped

  # ── Auth Service ──────────────────────────────────────────
  auth-service:
    build: ../auth-service
    command: npm run dev
    environment:
      PORT:                        3001
      NODE_ENV:                    development
      DATABASE_URL:                postgresql://postgres:password@auth-db:5432/auth_db
      JWT_SECRET:                  dev_jwt_secret_change_in_prod
      JWT_EXPIRES_IN:              15m
      REFRESH_TOKEN_EXPIRES_IN_DAYS: 30
      USER_SERVICE_URL:            http://user-service:3002
      INTERNAL_SECRET:             dev_internal_secret
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - worker-app-network

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       auth_db
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - worker-app-network

  # ── User Service ──────────────────────────────────────────
  user-service:
    build: ../user-service
    command: npm run dev
    environment:
      PORT:            3002
      NODE_ENV:        development
      DATABASE_URL:    postgresql://postgres:password@user-db:5432/user_db
      INTERNAL_SECRET: dev_internal_secret
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - worker-app-network

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       user_db
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - worker-app-network

  # ── Worker Service ────────────────────────────────────────
  worker-service:
    build: ../worker-service
    command: npm run dev
    environment:
      PORT:            3003
      NODE_ENV:        development
      DATABASE_URL:    postgresql://postgres:password@worker-db:5432/worker_db
      INTERNAL_SECRET: dev_internal_secret
    depends_on:
      worker-db:
        condition: service_healthy
    networks:
      - worker-app-network

  worker-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       worker_db
    volumes:
      - worker-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - worker-app-network

  # ── Booking Service ───────────────────────────────────────
  booking-service:
    build: ../booking-service
    command: npm run dev
    environment:
      PORT:                     3004
      NODE_ENV:                 development
      DATABASE_URL:             postgresql://postgres:password@booking-db:5432/booking_db
      INTERNAL_SECRET:          dev_internal_secret
      WORKER_SERVICE_URL:       http://worker-service:3003
      USER_SERVICE_URL:         http://user-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3007
    depends_on:
      booking-db:
        condition: service_healthy
    networks:
      - worker-app-network

  booking-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       booking_db
    volumes:
      - booking-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - worker-app-network

  # ── Review Service ────────────────────────────────────────
  review-service:
    build: ../review-service
    command: npm run dev
    environment:
      PORT:                 3005
      NODE_ENV:             development
      DATABASE_URL:         postgresql://postgres:password@review-db:5432/review_db
      INTERNAL_SECRET:      dev_internal_secret
      BOOKING_SERVICE_URL:  http://booking-service:3004
      WORKER_SERVICE_URL:   http://worker-service:3003
    depends_on:
      review-db:
        condition: service_healthy
    networks:
      - worker-app-network

  review-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       review_db
    volumes:
      - review-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - worker-app-network

  # ── Media Service ─────────────────────────────────────────
  media-service:
    build: ../media-service
    command: npm run dev
    environment:
      PORT:                  3006
      NODE_ENV:              development
      DATABASE_URL:          postgresql://postgres:password@media-db:5432/media_db
      INTERNAL_SECRET:       dev_internal_secret
      WORKER_SERVICE_URL:    http://worker-service:3003
      AWS_REGION:            ap-south-1
      AWS_ACCESS_KEY_ID:     your_access_key_id
      AWS_SECRET_ACCESS_KEY: your_secret_access_key
      S3_BUCKET_NAME:        worker-app-media
      MAX_FILE_SIZE_MB:      10
    depends_on:
      media-db:
        condition: service_healthy
    networks:
      - worker-app-network

  media-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       media_db
    volumes:
      - media-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - worker-app-network

  # ── Notification Service ──────────────────────────────────
  notification-service:
    build: ../notification-service
    command: npm run dev
    ports:
      - '3007:3007'        # Exposed for Socket.io WebSocket connections from clients
    environment:
      PORT:                  3007
      NODE_ENV:              development
      INTERNAL_SECRET:       dev_internal_secret
      ALLOWED_ORIGINS:       http://localhost:3000
      FIREBASE_PROJECT_ID:   your_firebase_project_id
      FIREBASE_CLIENT_EMAIL: your_firebase_client_email
      FIREBASE_PRIVATE_KEY:  "your_private_key"
    networks:
      - worker-app-network

# ── Volumes ───────────────────────────────────────────────
volumes:
  auth-db-data:
  user-db-data:
  worker-db-data:
  booking-db-data:
  review-db-data:
  media-db-data:

# ── Network ───────────────────────────────────────────────
networks:
  worker-app-network:
    driver: bridge
    name: worker-app-network
