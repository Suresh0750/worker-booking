version: '3.9'

services:
  user-service:
    build:
      context: .
      target: builder
    command: npm run dev
    ports:
      - '3002:3002'
    environment:
      PORT:                  3002
      NODE_ENV:              development
      DATABASE_URL:          postgresql://postgres:password@user-db:5432/user_db
      INTERNAL_SECRET:       dev_internal_secret
      WORKER_SERVICE_URL:    http://worker-service:3003
      RATE_LIMIT_WINDOW_MS:  900000
      RATE_LIMIT_MAX:        100
    volumes:
      - ./src:/app/src
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - worker-app-network
    restart: unless-stopped

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       user_db
    ports:
      - '5434:5432'
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - worker-app-network

volumes:
  user-db-data:

networks:
  worker-app-network:
    driver: bridge
    name: worker-app-network
